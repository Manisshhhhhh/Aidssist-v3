services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      AIDSSIST_ENVIRONMENT: production
      AIDSSIST_DATABASE_URL: sqlite:////data/aidssist.db
      AIDSSIST_STORAGE_BACKEND: local
      AIDSSIST_STORAGE_LOCAL_ROOT: /data/datasets
      AIDSSIST_REPORTS_LOCAL_ROOT: /data/reports
      AIDSSIST_DATASETS_DIR: /data/datasets
      AIDSSIST_REPORTS_DIR: /data/reports
      AIDSSIST_MAX_UPLOAD_MB: 10
      AIDSSIST_AUTH_ENABLED: ${AIDSSIST_AUTH_ENABLED:-false}
      AIDSSIST_API_KEY: ${AIDSSIST_API_KEY:-}
      AIDSSIST_USER_AUTH_ENABLED: ${AIDSSIST_USER_AUTH_ENABLED:-false}
      AIDSSIST_JWT_SECRET_KEY: ${AIDSSIST_JWT_SECRET_KEY:-}
      AIDSSIST_JWT_ALGORITHM: HS256
      AIDSSIST_ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      AIDSSIST_RATE_LIMIT_ENABLED: "true"
      AIDSSIST_RATE_LIMIT_REQUESTS: 120
      AIDSSIST_RATE_LIMIT_WINDOW_SECONDS: 60
      AIDSSIST_LOG_LEVEL: ${AIDSSIST_LOG_LEVEL:-INFO}
      AIDSSIST_LOG_FORMAT: ${AIDSSIST_LOG_FORMAT:-json}
      AIDSSIST_AUDIT_LOG_ENABLED: ${AIDSSIST_AUDIT_LOG_ENABLED:-true}
      AIDSSIST_REQUEST_LOGGING_ENABLED: ${AIDSSIST_REQUEST_LOGGING_ENABLED:-true}
      AIDSSIST_ERROR_DETAILS_ENABLED: ${AIDSSIST_ERROR_DETAILS_ENABLED:-false}
      AIDSSIST_LLM_ENABLED: ${AIDSSIST_LLM_ENABLED:-false}
      AIDSSIST_LLM_PROVIDER: ${AIDSSIST_LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AIDSSIST_GEMINI_MODEL: ${AIDSSIST_GEMINI_MODEL:-gemini-2.5-flash}
      AIDSSIST_LLM_TIMEOUT_SECONDS: ${AIDSSIST_LLM_TIMEOUT_SECONDS:-30}
      AIDSSIST_LLM_MAX_INPUT_CHARS: ${AIDSSIST_LLM_MAX_INPUT_CHARS:-30000}
      AIDSSIST_LLM_MAX_OUTPUT_TOKENS: ${AIDSSIST_LLM_MAX_OUTPUT_TOKENS:-1200}
      AIDSSIST_LLM_TEMPERATURE: ${AIDSSIST_LLM_TEMPERATURE:-0.2}
      AIDSSIST_SAFE_MODE: ${AIDSSIST_SAFE_MODE:-false}
      AIDSSIST_READ_ONLY_MODE: ${AIDSSIST_READ_ONLY_MODE:-false}
      AIDSSIST_BACKUP_DIR: ${AIDSSIST_BACKUP_DIR:-/data/backups}
      AIDSSIST_BACKUP_RETENTION_DAYS: ${AIDSSIST_BACKUP_RETENTION_DAYS:-14}
      AIDSSIST_STARTUP_PREFLIGHT_ENABLED: ${AIDSSIST_STARTUP_PREFLIGHT_ENABLED:-true}
      AIDSSIST_FAIL_FAST_ON_PREFLIGHT_ERROR: ${AIDSSIST_FAIL_FAST_ON_PREFLIGHT_ERROR:-false}
      AIDSSIST_AUTO_BACKUP_BEFORE_MIGRATION: ${AIDSSIST_AUTO_BACKUP_BEFORE_MIGRATION:-true}
      AIDSSIST_MAX_BACKUP_COUNT: ${AIDSSIST_MAX_BACKUP_COUNT:-20}
      AIDSSIST_CORS_ORIGINS: '["http://127.0.0.1:8080","http://localhost:8080","http://127.0.0.1:5173","http://localhost:5173"]'
      AIDSSIST_CORS_ORIGIN_REGEX: '^https?://(localhost|127\.0\.0\.1|\[::1\])(:\d+)?$'
    volumes:
      - aidssist_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./web
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8000
        VITE_AIDSSIST_API_KEY: ${VITE_AIDSSIST_API_KEY:-}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: python scripts/worker.py
    profiles:
      - worker
    environment:
      AIDSSIST_ENVIRONMENT: production
      AIDSSIST_DATABASE_URL: sqlite:////data/aidssist.db
      AIDSSIST_STORAGE_BACKEND: local
      AIDSSIST_STORAGE_LOCAL_ROOT: /data/datasets
      AIDSSIST_REPORTS_LOCAL_ROOT: /data/reports
      AIDSSIST_DATASETS_DIR: /data/datasets
      AIDSSIST_REPORTS_DIR: /data/reports
      AIDSSIST_MAX_UPLOAD_MB: 10
      AIDSSIST_AUTH_ENABLED: ${AIDSSIST_AUTH_ENABLED:-false}
      AIDSSIST_API_KEY: ${AIDSSIST_API_KEY:-}
      AIDSSIST_USER_AUTH_ENABLED: ${AIDSSIST_USER_AUTH_ENABLED:-false}
      AIDSSIST_JWT_SECRET_KEY: ${AIDSSIST_JWT_SECRET_KEY:-}
      AIDSSIST_JWT_ALGORITHM: HS256
      AIDSSIST_ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      AIDSSIST_RATE_LIMIT_ENABLED: "true"
      AIDSSIST_RATE_LIMIT_REQUESTS: 120
      AIDSSIST_RATE_LIMIT_WINDOW_SECONDS: 60
      AIDSSIST_ASYNC_JOBS_ENABLED: ${AIDSSIST_ASYNC_JOBS_ENABLED:-false}
      AIDSSIST_JOB_POLL_INTERVAL_SECONDS: 2
      AIDSSIST_JOB_MAX_ATTEMPTS: 3
      AIDSSIST_JOB_STALE_AFTER_MINUTES: 30
      AIDSSIST_LOG_LEVEL: ${AIDSSIST_LOG_LEVEL:-INFO}
      AIDSSIST_LOG_FORMAT: ${AIDSSIST_LOG_FORMAT:-json}
      AIDSSIST_AUDIT_LOG_ENABLED: ${AIDSSIST_AUDIT_LOG_ENABLED:-true}
      AIDSSIST_REQUEST_LOGGING_ENABLED: ${AIDSSIST_REQUEST_LOGGING_ENABLED:-true}
      AIDSSIST_ERROR_DETAILS_ENABLED: ${AIDSSIST_ERROR_DETAILS_ENABLED:-false}
      AIDSSIST_LLM_ENABLED: ${AIDSSIST_LLM_ENABLED:-false}
      AIDSSIST_LLM_PROVIDER: ${AIDSSIST_LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AIDSSIST_GEMINI_MODEL: ${AIDSSIST_GEMINI_MODEL:-gemini-2.5-flash}
      AIDSSIST_LLM_TIMEOUT_SECONDS: ${AIDSSIST_LLM_TIMEOUT_SECONDS:-30}
      AIDSSIST_LLM_MAX_INPUT_CHARS: ${AIDSSIST_LLM_MAX_INPUT_CHARS:-30000}
      AIDSSIST_LLM_MAX_OUTPUT_TOKENS: ${AIDSSIST_LLM_MAX_OUTPUT_TOKENS:-1200}
      AIDSSIST_LLM_TEMPERATURE: ${AIDSSIST_LLM_TEMPERATURE:-0.2}
      AIDSSIST_SAFE_MODE: ${AIDSSIST_SAFE_MODE:-false}
      AIDSSIST_READ_ONLY_MODE: ${AIDSSIST_READ_ONLY_MODE:-false}
      AIDSSIST_BACKUP_DIR: ${AIDSSIST_BACKUP_DIR:-/data/backups}
      AIDSSIST_BACKUP_RETENTION_DAYS: ${AIDSSIST_BACKUP_RETENTION_DAYS:-14}
      AIDSSIST_STARTUP_PREFLIGHT_ENABLED: ${AIDSSIST_STARTUP_PREFLIGHT_ENABLED:-true}
      AIDSSIST_FAIL_FAST_ON_PREFLIGHT_ERROR: ${AIDSSIST_FAIL_FAST_ON_PREFLIGHT_ERROR:-false}
      AIDSSIST_AUTO_BACKUP_BEFORE_MIGRATION: ${AIDSSIST_AUTO_BACKUP_BEFORE_MIGRATION:-true}
      AIDSSIST_MAX_BACKUP_COUNT: ${AIDSSIST_MAX_BACKUP_COUNT:-20}
    volumes:
      - aidssist_data:/data
    depends_on:
      backend:
        condition: service_healthy

volumes:
  aidssist_data:
