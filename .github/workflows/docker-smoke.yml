name: Docker Smoke

on:
  workflow_dispatch:

jobs:
  docker-smoke:
    name: Docker runtime smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python for smoke script
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install smoke dependencies
        run: python -m pip install requests

      - name: Build Docker images
        run: docker compose build

      - name: Start Docker stack
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs backend --tail=120
          exit 1

      - name: Check backend health headers
        run: curl -i http://127.0.0.1:8000/health

      - name: Check frontend nginx
        run: curl -I http://127.0.0.1:8080

      - name: Run smoke test
        run: python backend/scripts/smoke_test.py --base-url http://127.0.0.1:8000

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v --remove-orphans
